<body>
  <header>
    <img src="Logo_Cleverclassroom_NoBG.png" alt="CleverClassroom Logo">
    <h1>Essay Writing</h1>

  <div class="container">
    <a class="back" href="essay.html">← Zurück zu Essay Writing</a>

    <div class="box">
      <h2>Feedback-Prompt</h2>
      <p>Kopiere diesen Prompt und füge ihn direkt in ChatGPT ein.</p>

      <textarea id="promptBox" readonly>Aufgabe an das System: Der Schüler liefert einen englischen Essay (ca. 160 Wörter) zur Prüfungsvorbereitung Englisch Realschule Baden-Württemberg (Argumentative Writing: Pros & Cons). Grundprinzip des Feedbacks: Jeder Fehler wird nicht nur benannt, sondern immer mit einer konkreten Verbesserung am Originaltext gezeigt. Der Schüler soll nach dem Feedback nicht nur wissen was falsch war – sondern warum und wie er es beim nächsten Mal besser macht. Zeige immer: Originalsatz → Upgrade → kurze Erklärung. Erwartete Wortzahl: Essay 140–200 Wörter (Ziel: 160) – bei unter 140 oder über 200 gibt es in der Prüfung Notenabzug! Argument-Standard: Claim → Reason → Mini-Example → Effect (alle vier Teile, ca. 30–35 Wörter pro Argument) Modell: 2 Pro-Argumente + 2 Contra-Argumente Struktur: linear oder antithetisch (konsequent durchgezogen) Fazit: sachlich, abwägend, keine eigene Meinung, keine neuen Argumente, ca. 25–30 Wörter Einleitung: Thema nennen, verschiedene Meinungen andeuten, keine eigene Meinung, ca. 20–25 Wörter Gib professionelles, motivierendes, schülergerechtes und präzises Feedback — fokussiert auf bessere Prüfungsergebnisse. Ton: freundlich-coachend, klar, motivierend. Kein Baby-Talk, keine Abwertung, keine Noten. Ziel: „Coach → Upgrade → Prüfungserfolg". AUSGABEFORMAT (in genau dieser Reihenfolge): INTRO: Starte mit einem kurzen, persönlichen Einstieg (2–3 Sätze) – z. B.: „Dein Essay lässt sich gut lesen und geht schon in die richtige Richtung. Du zeigst, dass du das Thema verstanden hast – jetzt schauen wir gemeinsam, wie du es noch prüfungsreifer machst." Passe den Einstieg an den tatsächlichen Essay an – nicht immer denselben Satz. 1⃣ 🧭 Textsorte & Aufgabenbezug: Aufgabenbezug/Thema getroffen? (🟢/🟡/❌) Ton sachlich und abwägend – kein "I think / in my opinion"? (🟢/🟡/❌) Fazit objektiv formuliert z. B. "The arguments suggest…"? (🟢/🟡/❌) Gib 2 Mini-Fixes im Format: „Originalsatz: '…' → Upgrade: '…' → Warum besser: …" 2⃣ 📏 Wortzahl & Prüfungsfenster: Zähle die Wörter exakt – aufgeteilt nach Abschnitten: Einleitung: X Wörter (Ziel: 20–25) (🟢/🟡/❌) Argument 1 (Pro): X Wörter (Ziel: 30–35) (🟢/🟡/❌) Argument 2 (Pro): X Wörter (Ziel: 30–35) (🟢/🟡/❌) Argument 3 (Contra): X Wörter (Ziel: 30–35) (🟢/🟡/❌) Argument 4 (Contra): X Wörter (Ziel: 30–35) (🟢/🟡/❌) Fazit: X Wörter (Ziel: 25–30) (🟢/🟡/❌) Gesamt: X Wörter (Ziel: 140–200 – Achtung: unter 140 oder über 200 = Notenabzug in der Prüfung!) (🟢/🟡/❌) Coach-Empfehlung: Bei zu lang: Wiederholungen kürzen + ein Beispiel streichen (Ziel: −10 bis −25 Wörter) Bei zu kurz: 1 Argument-Detail + 1 Mini-Beispiel ergänzen Bei 🟢: „Word-Management prüfungsstark. ✓" 3⃣ 🏗️ Struktur & Modell: Einleitung – Hauptteil – Schluss vorhanden? (🟢/🟡/❌) Logische Reihenfolge der Argumente? (🟢/🟡/❌) 2 Pro + 2 Contra Argumente vorhanden? (🟢/🟡/❌) Struktur linear oder antithetisch – konsequent durchgezogen? (🟢/🟡/❌) + 1 Satz Begründung Argumente vom schwächeren zum stärkeren geordnet? (🟢/🟡/❌) Wortzahl-Verteilung ausgewogen? (🟢/🟡/❌) Gib 1 Übergangs-Upgrade im Format: „Originalsatz: '…' → Upgrade: '…' → Warum besser: …" 4⃣ ⚖️ Argumentation – Claim, Reason, Mini-Example, Effect: Prüfe jedes der vier Argumente einzeln nach dem Standard: Claim → Reason → Mini-Example → Effect Argument 1 (Pro): Claim vorhanden? (🟢/🟡/❌) Reason vorhanden? (🟢/🟡/❌) Mini-Example vorhanden? (🟢/🟡/❌) Effect vorhanden? (🟢/🟡/❌) Argument 2 (Pro): Claim vorhanden? (🟢/🟡/❌) Reason vorhanden? (🟢/🟡/❌) Mini-Example vorhanden? (🟢/🟡/❌) Effect vorhanden? (🟢/🟡/❌) Argument 3 (Contra): Claim vorhanden? (🟢/🟡/❌) Reason vorhanden? (🟢/🟡/❌) Mini-Example vorhanden? (🟢/🟡/❌) Effect vorhanden? (🟢/🟡/❌) Argument 4 (Contra): Claim vorhanden? (🟢/🟡/❌) Reason vorhanden? (🟢/🟡/❌) Mini-Example vorhanden? (🟢/🟡/❌) Effect vorhanden? (🟢/🟡/❌) Danach: 2 Mini-Upgrades (1 Pro + 1 Contra) im Format: „Originalsatz: '…' → Upgrade: '…' → Warum besser: …" 5⃣ 🎣 Einleitung – Die 3 Kriterien: Thema klar genannt? (🟢/🟡/❌) Verschiedene Meinungen / Perspektiven angedeutet? (🟢/🟡/❌) Keine persönliche Meinung enthalten? (🟢/🟡/❌) Wortzahl ca. 20–25 Wörter? (🟢/🟡/❌) Gib 2 bessere Einleitungs-Alternativen: Option A: neutraler Essay-Stil Option B: als Frage/Impuls 6⃣ 🏁 Fazit – Die 3 Kriterien: Keine neuen Argumente enthalten? (🟢/🟡/❌) Keine persönliche Meinung ("I think / in my opinion")? (🟢/🟡/❌) Schlussfolgerung folgt logisch aus den Argumenten? (🟢/🟡/❌) Sachlicher Stil z. B. "The arguments suggest… / Overall, it can be said that…"? (🟢/🟡/❌) Wortzahl ca. 25–30 Wörter? (🟢/🟡/❌) Gib 2 stärkere Beispiel-Schlusssätze + 1 Satz Begründung warum sie besser wirken. 7⃣ ✍️ Sprache, Linking Words & Useful Phrases: Linking Words vorhanden und abwechslungsreich? (🟢/🟡/❌) Satzbau-Variation? (🟢/🟡/❌) Register sachlich und prüfungsreif? (🟢/🟡/❌) Useful Phrases passend eingesetzt? (🟢/🟡/❌) Gib 3 Austausch-Vorschläge im Format: „Phrase: X → Alternative: Y / Z Originalsatz: '…' → Upgrade: '…' → Warum besser: …" Gib 3–4 weitere Upgrades im Format: „Originalsatz: '…' → Upgrade: '…' → Warum besser: …" 8⃣ 🧩 Grammatik – Genauigkeit (Tabelle): Tabelle mit 3 Spalten: „❌ Fehler im Satz" | „🟢 Korrektur im Satz" | „🧠 Coach-Erklärung" Mind. 2 Optimierungen – auch wenn wenige Fehler vorhanden. 9⃣ 🔤 Rechtschreibung: Liste konkrete Fehler und gib einen kurzen Coach-Hinweis. Wenn keine Fehler: „Rechtschreibung prüfungsstark. ✓" 🔟 🛠️ 5 Upgrades (Mini-Surgery): Nur Upgrades die NICHT bereits in Punkten 1–9 genannt wurden. Format: „Original: … → Tipp (prüfungsfit): … → Top-Tipp (stilistisch stärker): … → 📝 Warum besser: … (1 Satz)" Wenn weniger als 5 neue: „Weitere Upgrades würden Wiederholungen erzeugen." 1⃣1⃣ 🎯 Deine 3 wichtigsten Baustellen: Priorisiere nach diesem Schema: Zuerst: Struktur / Argumentation / Wortzahl Dann: Linking Words / Stil / Useful Phrases Zuletzt: Grammatik / Rechtschreibung Format: 🔧 Baustelle 1: [konkret, 1–2 Sätze, sofort umsetzbar] 🔧 Baustelle 2: [konkret, 1–2 Sätze, sofort umsetzbar] 🔧 Baustelle 3: [konkret, 1–2 Sätze, sofort umsetzbar] 1⃣2⃣ 🌟 Schlussfazit: Schreibe ein Schlussfazit als Fließtext (~50 Wörter) mit: 3–4 Stärken 2–3 nächsten Zielen freundlich, motivierend, realistisch, prüfungsnah Am Ende: 1 motivierender „Fazit in einem Satz" auf Deutsch (kreativ, kurz, nicht notenfokussiert) Hier ist das Essay:</textarea>

      <button class="btn" onclick="copyPrompt()">Prompt kopieren</button>
      <div class="note" id="copyNote"></div>
    </div>
  </div>

  <script>
    function copyPrompt() {
      const box = document.getElementById("promptBox");
      navigator.clipboard.writeText(box.value).then(() => {
        document.getElementById("copyNote").textContent = "Prompt wurde kopiert.";
      });
    }
