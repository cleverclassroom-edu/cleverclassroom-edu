<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HOW TO WRITE A COMMENT</title>

<style>
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --btn:#2f55ff;
  --btnHover:#1f3ed6;
  --border:#e5e7eb;
  --radius:24px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 600px at 30% -10%, #e9efff 0%, var(--bg) 50%, var(--bg) 100%);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:30px;
}

.container{
  max-width:900px;
  width:100%;
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:0 25px 60px rgba(0,0,0,0.08);
  padding:60px 40px;
  text-align:center;
}

h1{
  font-size:44px;
  margin:0;
  letter-spacing:-0.5px;
  text-transform:uppercase;
}

h2{
  font-size:34px;
  margin:10px 0 28px 0;
  font-weight:650;
}

.downloadBox{
  border:1px solid var(--border);
  border-radius:18px;
  padding:26px 26px 22px 26px;
  background:#fafbff;
}

.previewWrap{
  display:flex;
  justify-content:center;
  margin:8px 0 14px 0;
}

.preview{
  width:min(520px, 100%);
  height:190px; /* ca. 5 cm bei typischer Bildschirmdarstellung */
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.preview iframe{
  width:100%;
  height:100%;
  border:0;
}

.filename{
  margin:12px 0 16px 0;
  font-size:14px;
  color:var(--muted);
}

.filename code{
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  background:#f3f4f6;
  padding:3px 8px;
  border-radius:10px;
  border:1px solid var(--border);
  color:#111827;
}

.buttonRow{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:16px 26px;
  border-radius:12px;
  font-weight:700;
  text-decoration:none;
  font-size:17px;
}

.primary{ background:var(--btn); color:white; }
.primary:hover{ background:var(--btnHover); }

.secondary{
  background:white;
  border:1px solid var(--border);
  color:var(--text);
}
.secondary:hover{ background:#f9fafb; }

.meta{
  margin-top:18px;
  font-size:14px;
  color:var(--muted);
}

.footer{
  margin-top:28px;
  font-size:14px;
  color:#9ca3af;
}
</style>
</head>

<body>
  <div class="container">

    <h1>HOW TO WRITE A COMMENT</h1>
    <h2>Planungshilfe</h2>

    <div class="downloadBox">

      <!-- Vorschau -->
      <div class="previewWrap">
        <div class="preview" aria-label="PDF Vorschau">
          <iframe src="../Planungshilfe_Comment.pdf#view=FitH&toolbar=0&navpanes=0&scrollbar=0"></iframe>
        </div>
      </div>

      <!-- Dateiname -->
      <div class="filename">
        Datei: <code>Planungshilfe_Comment.pdf</code>
      </div>

      <!-- Buttons -->
      <div class="buttonRow">
        <a class="btn primary" href="../Planungshilfe_Comment.pdf" download>PDF herunterladen</a>
        <a class="btn secondary" href="../Planungshilfe_Comment.pdf" target="_blank" rel="noopener">PDF im Browser anzeigen</a>
      </div>

      <div class="meta">Stand: März 2026</div>
    </div>

    <div class="footer">© cleverclassroom-edu | S. Wissert</div>

  </div>
</body>
</html>
